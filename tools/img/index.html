<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 처리 도구</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkSansSystem, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .content {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
            margin-bottom: 25px;
        }

        .upload-area:hover {
            background: #eef0ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e0e5ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 18px;
            color: #666;
        }

        .upload-hint {
            font-size: 14px;
            color: #999;
            margin-top: 8px;
        }

        #fileInput {
            display: none;
        }

        .section {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #eee;
        }

        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .icon {
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input[type="number"],
        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .size-inputs {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
        }

        .size-inputs input {
            width: 100%;
        }

        .size-link {
            font-size: 24px;
            color: #667eea;
            cursor: pointer;
            text-align: center;
            transition: color 0.3s;
        }

        .size-link:hover {
            color: #764ba2;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .color-picker-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-picker-group input[type="color"] {
            width: 60px;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }

        .color-picker-group button {
            padding: 10px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .color-picker-group button:hover {
            background: #764ba2;
        }

        .slider-group {
            margin-top: 15px;
        }

        .slider-group input[type="range"] {
            width: 100%;
            accent-color: #667eea;
            height: 8px;
        }

        .slider-value {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .format-select {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .format-option {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .format-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .format-option.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .preview-container {
            background: repeating-conic-gradient(
                #ccc 0 10px,
                #fff 0 20px,
                #fff 10px
            );
            border-radius: 12px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 20px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 600px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .image-info {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .info-badge {
            background: #f0f3ff;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #667eea;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #764ba2;
        }

        .btn-reset {
            background: #ff6b6b;
            color: white;
        }

        .btn-reset:hover {
            background: #ee5a5a;
        }

        .no-image {
            text-align: center;
            color: #999;
        }

        .no-image .icon {
            font-size: 80px;
            margin-bottom: 15px;
        }

        .no-image p {
            font-size: 18px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ 이미지 처리 도구</h1>

        <div class="main-grid">
            <!-- 사이드바 - 컨트롤 -->
            <div class="sidebar">
                <!-- 업로드 -->
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">이미지를 드래그하거나 클릭하세요</div>
                    <div class="upload-hint">PNG, JPG, JPEG, WEBP 지원</div>
                    <input type="file" id="fileInput" accept="image/*">
                </div>

                <!-- 리사이즈 -->
                <div class="section">
                    <div class="section-title">
                        <span class="icon">📐</span> 리사이즈
                    </div>
                    <div class="size-inputs">
                        <div class="form-group">
                            <label>너비 (px)</label>
                            <input type="number" id="widthInput" placeholder="너비">
                        </div>
                        <span class="size-link" id="linkBtn">🔗</span>
                        <div class="form-group">
                            <label>높이 (px)</label>
                            <input type="number" id="heightInput" placeholder="높이">
                        </div>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="aspectRatio" checked>
                        <label for="aspectRatio">측면 비율 유지</label>
                    </div>
                </div>

                <!-- 배경 투명화 -->
                <div class="section">
                    <div class="section-title">
                        <span class="icon">✨</span> 배경 투명화
                    </div>
                    <div class="form-group">
                        <label>투명할 색상 선택</label>
                        <div class="color-picker-group">
                            <input type="color" id="colorPicker" value="#ffffff">
                            <button id="pickColorBtn">🎨 색상 선택</button>
                        </div>
                    </div>
                    <div class="slider-group">
                        <label>허용 오차: <span id="toleranceValue">30</span></label>
                        <input type="range" id="tolerance" min="0" max="100" value="30">
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="removeBg">
                        <label for="removeBg">배경 투명하게</label>
                    </div>
                </div>

                <!-- 확장자 변경 -->
                <div class="section">
                    <div class="section-title">
                        <span class="icon">🔄</span> 확장자 변경
                    </div>
                    <div class="format-select">
                        <div class="format-option active" data-format="png">PNG</div>
                        <div class="format-option" data-format="jpg">JPG</div>
                        <div class="format-option" data-format="webp">WEBP</div>
                    </div>
                </div>

                <!-- 다운로드 -->
                <div class="section">
                    <div class="action-buttons" style="flex-direction: column;">
                        <button class="btn btn-primary" id="downloadBtn" disabled>
                            💾 다운로드
                        </button>
                        <button class="btn btn-reset" id="resetBtn" disabled>
                            🔄 초기화
                        </button>
                    </div>
                </div>
            </div>

            <!-- 메인 컨텐츠 - 미리보기 -->
            <div class="content">
                <div id="previewContainer">
                    <div class="no-image" id="noImage">
                        <div class="icon">🖼️</div>
                        <p>이미지를 업로드하세요</p>
                    </div>
                    <div id="imagePreview" style="display: none;">
                        <div class="preview-container">
                            <img id="previewImg" class="preview-image">
                        </div>
                        <div class="image-info" id="imageInfo"></div>
                    </div>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 메시지 -->
    <div class="toast" id="toast"></div>

    <script>
        // 전역 변수
        let originalImage = null;
        let originalWidth = 0;
        let originalHeight = 0;
        let originalFileName = '';
        let aspectLocked = true;
        let selectedFormat = 'png';
        let isPickingColor = false;

        // DOM 요소
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const linkBtn = document.getElementById('linkBtn');
        const aspectRatioCheckbox = document.getElementById('aspectRatio');
        const colorPicker = document.getElementById('colorPicker');
        const pickColorBtn = document.getElementById('pickColorBtn');
        const toleranceSlider = document.getElementById('tolerance');
        const toleranceValue = document.getElementById('toleranceValue');
        const removeBgCheckbox = document.getElementById('removeBg');
        const previewImg = document.getElementById('previewImg');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const noImage = document.getElementById('noImage');
        const imagePreview = document.getElementById('imagePreview');
        const imageInfo = document.getElementById('imageInfo');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const toast = document.getElementById('toast');

        // 이벤트 리스너
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                loadImage(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                loadImage(e.target.files[0]);
            }
        });

        // 측면 비율 토글
        linkBtn.addEventListener('click', () => {
            aspectLocked = !aspectLocked;
            linkBtn.textContent = aspectLocked ? '🔗' : '🔓';
            aspectRatioCheckbox.checked = aspectLocked;
        });

        aspectRatioCheckbox.addEventListener('change', () => {
            aspectLocked = aspectRatioCheckbox.checked;
            linkBtn.textContent = aspectLocked ? '🔗' : '🔓';
        });

        // 너비 변경 시
        widthInput.addEventListener('input', () => {
            if (aspectLocked && originalImage) {
                const ratio = originalHeight / originalWidth;
                heightInput.value = Math.round(widthInput.value * ratio);
            }
            updateImage();
        });

        // 높이 변경 시
        heightInput.addEventListener('input', () => {
            if (aspectLocked && originalImage) {
                const ratio = originalWidth / originalHeight;
                widthInput.value = Math.round(heightInput.value * ratio);
            }
            updateImage();
        });

        // 색상 선택
        pickColorBtn.addEventListener('click', () => {
            isPickingColor = !isPickingColor;
            pickColorBtn.textContent = isPickingColor ? '✅ 선택 완료' : '🎨 색상 선택';
            previewImg.style.cursor = isPickingColor ? 'crosshair' : 'default';
        });

        // 이미지 클릭으로 색상 선택
        previewImg.addEventListener('click', (e) => {
            if (!isPickingColor) return;

            const rect = previewImg.getBoundingClientRect();
            const scaleX = originalImage.naturalWidth / rect.width;
            const scaleY = originalImage.naturalHeight / rect.height;

            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1;
            canvas.height = 1;
            ctx.drawImage(originalImage, x, y, 1, 1, 0, 0, 1, 1);
            const imageData = ctx.getImageData(0, 0, 1, 1);

            const r = imageData.data[0];
            const g = imageData.data[1];
            const b = imageData.data[2];

            const hex = '#' + r.toString(16).pad(2, '0') +
                      g.toString(16).pad(2, '0') +
                      b.toString(16).pad(2, '0');

            colorPicker.value = hex;
            showToast(`색상 선택: ${hex}`);
        });

        // 허용 오차 변경
        toleranceSlider.addEventListener('input', () => {
            toleranceValue.textContent = toleranceSlider.value;
            updateImage();
        });

        // 배경 투명화 토글
        removeBgCheckbox.addEventListener('change', () => {
            updateImage();
        });

        // 포맷 선택
        document.querySelectorAll('.format-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.format-option').forEach(o => {
                    o.classList.remove('active');
                });
                option.classList.add('active');
                selectedFormat = option.dataset.format;
            });
        });

        // 다운로드
        downloadBtn.addEventListener('click', () => {
            if (!originalImage) return;

            showProgress(10);

            const canvas = processImage();
            const mimeType = getMimeType(selectedFormat);
            const fileName = originalFileName.replace(/\.[^.]+$/, '') + '.' + selectedFormat;

            canvas.toBlob((blob) => {
                showProgress(100);

                setTimeout(() => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = fileName;
                    link.click();
                    URL.revokeObjectURL(url);

                    hideProgress();
                    showToast('✅ 다운로드 완료!');
                }, 500);
            }, mimeType === 'image/jpeg' ? 0.95 : undefined);
        });

        // 초기화
        resetBtn.addEventListener('click', () => {
            originalImage = null;
            widthInput.value = '';
            heightInput.value = '';
            removeBgCheckbox.checked = false;
            selectedFormat = 'png';
            document.querySelectorAll('.format-option').forEach(o => {
                o.classList.remove('active');
            });
            document.querySelector('.format-option[data-format="png"]').classList.add('active');
            noImage.style.display = 'block';
            imagePreview.style.display = 'none';
            downloadBtn.disabled = true;
            resetBtn.disabled = true;
            fileInput.value = '';
            showToast('🔄 초기화 완료');
        });

        // 이미지 로드
        function loadImage(file) {
            originalFileName = file.name;
            const reader = new FileReader();

            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    originalWidth = img.naturalWidth;
                    originalHeight = img.naturalHeight;

                    widthInput.value = originalWidth;
                    heightInput.value = originalHeight;

                    noImage.style.display = 'none';
                    imagePreview.style.display = 'block';

                    updateImage();
                    updateImageInfo();
                    downloadBtn.disabled = false;
                    resetBtn.disabled = false;

                    showToast('✅ 이미지 로드 완료');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 이미지 업데이트
        function updateImage() {
            if (!originalImage) return;

            const canvas = processImage();
            previewImg.src = canvas.toDataURL();
            updateImageInfo();
        }

        // 이미지 처리
        function processImage() {
            const width = parseInt(widthInput.value) || originalWidth;
            const height = parseInt(heightInput.value) || originalHeight;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            // 리사이즈
            ctx.drawImage(originalImage, 0, 0, width, height);

            // 배경 투명화
            if (removeBgCheckbox.checked) {
                const imageData = ctx.getImageData(0, 0, width, height);
                const data = imageData.data;
                const tolerance = parseInt(toleranceSlider.value);

                const targetColor = hexToRgb(colorPicker.value);

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];

                    const diff = Math.sqrt(
                        Math.pow(r - targetColor.r, 2) +
                        Math.pow(g - targetColor.g, 2) +
                        Math.pow(b - targetColor.b, 2)
                    );

                    if (diff <= tolerance) {
                        data[i + 3] = 0; // 투명
                    }
                }

                ctx.putImageData(imageData, 0, 0);
            }

            return canvas;
        }

        // 이미지 정보 업데이트
        function updateImageInfo() {
            const width = parseInt(widthInput.value) || originalWidth;
            const height = parseInt(heightInput.value) || originalHeight;

            imageInfo.innerHTML = `
                <div class="info-badge">📐 ${width} × ${height}</div>
                <div class="info-badge">📁 ${selectedFormat.toUpperCase()}</div>
                <div class="info-badge">🎨 ${removeBgCheckbox.checked ? '배경 투명' : '배경 유지'}</div>
            `;
        }

        // MIME 타입 반환
        function getMimeType(format) {
            const types = {
                'png': 'image/png',
                'jpg': 'image/jpeg',
                'webp': 'image/webp'
            };
            return types[format] || 'image/png';
        }

        // HEX to RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            };
        }

        // 진행률 표시
        function showProgress(percent) {
            progressBar.style.display = 'block';
            progressFill.style.width = percent + '%';
        }

        function hideProgress() {
            setTimeout(() => {
                progressBar.style.display = 'none';
                progressFill.style.width = '0%';
            }, 1000);
        }

        // Toast 메시지
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
