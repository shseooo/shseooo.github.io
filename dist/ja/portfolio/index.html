<!DOCTYPE html><html lang="ja"> <head><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Blog &amp; Portfolio"><title>ポートフォリオ</title></head><link rel="stylesheet" href="/styles/global.css"><script>
      const theme = localStorage?.getItem('theme') ?? '';
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');

      document.addEventListener('astro:after-swap', () => {

</a> <div id="nav-links" style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;"> <a href="/ja/blog" class="btn btn-secondary">ブログ</a> <a href="/ja/portfolio" class="btn btn-secondary">ポートフォリオ</a> <a href="/ja/blog/editor" class="btn btn-primary">エディター</a> <div id="lang-switcher" style="display: inline-flex; gap: 0.25rem;"> <a href="/ko/portfolio/" class="btn " + (lang.code="==" currentLang ? 'btn-primary' : 'btn-secondary') style="padding: 0.25rem 0.5rem; font-size: 0.75rem;"> 한국어 </a><a href="/en/portfolio/" class="btn " + (lang.code="==" currentLang ? 'btn-primary' : 'btn-secondary') style="padding: 0.25rem 0.5rem; font-size: 0.75rem;"> English </a><a href="/ja/portfolio/" class="btn " + (lang.code="==" currentLang ? 'btn-primary' : 'btn-secondary') style="padding: 0.25rem 0.5rem; font-size: 0.75rem;"> 日本語 </a> </div> </div> </nav> </header> <script>
  const lang = window.location.pathname.split('/')[1] || 'ko';
  const labels = {
    ko: { login: '로그인', logout: '로그아웃' },
    en: { login: 'Login', logout: 'Logout' },
    ja: { login: 'ログイン', logout: 'ログアウト' },
  };

  function updateAuthUI() {
    const token = localStorage.getItem('github_token');
    const user = localStorage.getItem('github_user');
    const navDiv = document.getElementById('nav-links');
    if (!navDiv) return;

    const existing = document.getElementById('auth-btn');
    if (existing) existing.remove();

    const btn = document.createElement('a');
    btn.id = 'auth-btn';
    btn.className = 'btn ' + (token ? 'btn-secondary' : 'btn-primary');

    if (token) {
      btn.textContent = (user ? '@' + user + ' · ' : '') + (labels[lang]?.logout || labels.en.logout);
      btn.href = '#';
      btn.onclick = (e) => {
        e.preventDefault();
        localStorage.removeItem('github_token');
        localStorage.removeItem('github_user');
        updateAuthUI();
      };
    } else {
      btn.textContent = labels[lang]?.login || labels.en.login;
      btn.href = '#';
      btn.onclick = (e) => {
        e.preventDefault();
        window.location.href = `/${lang}/admin`;
      };
    }

    navDiv.appendChild(btn);
  }

  document.addEventListener('DOMContentLoaded', updateAuthUI);
  document.addEventListener('astro:after-swap', updateAuthUI);
</script> <button id="themeToggle" class="btn btn-secondary" style="position: fixed; bottom: 1.5rem; right: 1.5rem; border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; z-index: 100;" title="Toggle theme"> <span class="sun" style="display: block;">☀️</span> <span class="moon" style="display: none;">🌙</span> </button> <script>
  const toggle = document.getElementById('themeToggle');
  const sun = toggle?.querySelector('.sun');
  const moon = toggle?.querySelector('.moon');

  function updateIcons() {
    const isDark = document.documentElement.classList.contains('dark');
    if (sun) sun.style.display = isDark ? 'none' : 'block';
    if (moon) moon.style.display = isDark ? 'block' : 'none';
  }

  toggle?.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    const isDark = document.documentElement.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    updateIcons();
  });

  updateIcons();
  document.addEventListener('astro:after-swap', updateIcons);
</script> <main class="container" style="padding: 2rem 1.5rem; min-height: 60vh;">  <div class="container mx-auto px-4 py-12"> <h1 class="text-3xl font-bold mb-8">ポートフォリオ</h1> <div class="grid md:grid-cols-2 gap-6"> <a href="/portfolio/hello-world/" class="card block"> <h2 class="text-xl font-semibold mb-2">Hello World</h2> <p class="text-gray-600">最初のプログラム</p> </a><a href="/portfolio/todo-app/" class="card block"> <h2 class="text-xl font-semibold mb-2">TODOアプリ</h2> <p class="text-gray-600">シンプルなTODOリスト</p> </a> </div> </div>  </main> <footer style="border-top: 1px solid var(--border-color); padding: 2rem 0; margin-top: 3rem; text-align: center; color: var(--text-secondary); font-size: 0.875rem;"> <div class="container"> <p>&copy; 2026 Blog & Portfolio. Built with Astro & GitHub Pages.</p> <p style="margin-top: 0.5rem;"> <a href="/ja/admin"> 管理者設定 </a> </p> </div> </footer> </body></html>
