  const lang = window.location.pathname.split('/')[1] || 'ko';
  const labels = {
    ko: { login: '로그인', logout: '로그아웃' },
    en: { login: 'Login', logout: 'Logout' },
    ja: { login: 'ログイン', logout: 'ログアウト' },
  };

  function updateAuthUI() {
    const token = localStorage.getItem('github_token');
    const user = localStorage.getItem('github_user');
    const navDiv = document.getElementById('nav-links');
    if (!navDiv) return;

    const existing = document.getElementById('auth-btn');
    if (existing) existing.remove();

    const btn = document.createElement('a');
    btn.id = 'auth-btn';
    btn.className = 'btn ' + (token ? 'btn-secondary' : 'btn-primary');

    if (token) {
      btn.textContent = (user ? '@' + user + ' · ' : '') + (labels[lang]?.logout || labels.en.logout);
      btn.href = '#';
      btn.onclick = (e) => {
        e.preventDefault();
        localStorage.removeItem('github_token');
        localStorage.removeItem('github_user');
        updateAuthUI();
      };
    } else {
      btn.textContent = labels[lang]?.login || labels.en.login;
      btn.href = '#';
      btn.onclick = (e) => {
        e.preventDefault();
        window.location.href = `/${lang}/admin`;
      };
    }

    navDiv.appendChild(btn);
  }

  document.addEventListener('DOMContentLoaded', updateAuthUI);
  document.addEventListener('astro:after-swap', updateAuthUI);
</script> <button id="themeToggle" class="btn btn-secondary" style="position: fixed; bottom: 1.5rem; right: 1.5rem; border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; z-index: 100;" title="Toggle theme"> <span class="sun" style="display: block;">☀️</span> <span class="moon" style="display: none;">🌙</span> </button> <script>

</script> <main class="container" style="padding: 2rem 1.5rem; min-height: 60vh;">  <div class="container mx-auto px-4 py-8"> <div class="mb-4"> <a href="/ko/blog" class="btn btn-secondary"> ← 뒤로 </a> </div> <div class="markdown-editor" data-astro-cid-nw6wyc5i> <div class="editor-header" data-astro-cid-nw6wyc5i> <h2 data-astro-cid-nw6wyc5i>Markdown Editor</h2> <div class="editor-actions" data-astro-cid-nw6wyc5i> <button id="saveBtn" class="btn btn-primary" data-astro-cid-nw6wyc5i>Save</button> <button id="deleteBtn" class="btn btn-danger" data-astro-cid-nw6wyc5i>Delete</button> </div> </div> <div id="message" class="message" style="display: none;" data-astro-cid-nw6wyc5i></div> <div class="editor-container" data-astro-cid-nw6wyc5i> <div class="editor-pane" data-astro-cid-nw6wyc5i> <h3 data-astro-cid-nw6wyc5i>Editor</h3> <textarea id="editor" class="editor-textarea" placeholder="Write your MDX content here..." data-astro-cid-nw6wyc5i></textarea> </div> <div class="preview-pane" data-astro-cid-nw6wyc5i> <h3 data-astro-cid-nw6wyc5i>Preview</h3> <div id="preview" class="preview-content" data-astro-cid-nw6wyc5i></div> </div> </div> </div>  <script>
  // Parse lang and slug from URL path
  const segments = window.location.pathname.split('/').filter(Boolean);
  const lang = segments[0] || 'ko';
  const slug = segments[segments.length - 1] || '';

  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const saveBtn = document.getElementById('saveBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const message = document.getElementById('message');

  function showMessage(text, type = 'success') {
    message.textContent = text;
    message.className = 'message ' + type;
    message.style.display = 'block';
    setTimeout(() => { message.style.display = 'none'; }, 3000);
  }

  // File path: src/content/blog/{lang}/{slug}.mdx
  const filePath = `src/content/blog/${lang}/${slug}.mdx`;

  async function loadContent() {
    const token = localStorage.getItem('github_token');
    if (!token) { showMessage('Please login first', 'error'); return; }

    const owner = localStorage.getItem('github_user') || '';
    const repo = localStorage.getItem('github_repo') || 'blog';

    try {
      const resp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}?ref=main`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });

      if (resp.status === 404) {
        // New post template
        const now = new Date();
        const date = now.toISOString().split('T')[0];
        editor.value = `---
title: "New Post (${lang})"
date: "${date}"
lang: "${lang}"
tags: []
summary: ""
category: "general"
---

# New Post

Write your content here...
`;
        preview.textContent = editor.value;
      } else {
        const data = await resp.json();
        const content = decodeURIComponent(escape(atob(data.content)));
        editor.value = content;
        preview.textContent = content;
      }
    } catch (err) {
      showMessage('Failed to load content: ' + err.message, 'error');
    }
  }

  async function saveContent() {
    const token = localStorage.getItem('github_token');
    if (!token) { showMessage('Please login first', 'error'); return; }

    const owner = localStorage.getItem('github_user') || '';
    const repo = localStorage.getItem('github_repo') || 'blog';

    try {
      let sha = null;
      const shaResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}?ref=main`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });

      if (shaResp.ok) {
        const shaData = await shaResp.json();
        sha = shaData.sha;
      }

      const body = {
        message: `Update ${lang}/${slug}.mdx`,
        content: btoa(unescape(encodeURIComponent(editor.value))),
        branch: 'main',
      };
      if (sha) body.sha = sha;

      const resp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (resp.ok) {
        showMessage('Saved successfully!');
      } else {
        const error = await resp.json();
        showMessage('Failed to save: ' + (error.message || 'Unknown error'), 'error');
      }
    } catch (err) {
      showMessage('Failed to save: ' + err.message, 'error');
    }
  }

  async function deleteContent() {
    if (!confirm('Are you sure you want to delete this post?')) return;

    const token = localStorage.getItem('github_token');
    if (!token) { showMessage('Please login first', 'error'); return; }

    const owner = localStorage.getItem('github_user') || '';
    const repo = localStorage.getItem('github_repo') || 'blog';

    try {
      const shaResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}?ref=main`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });

      if (shaResp.status === 404) { showMessage('File not found', 'error'); return; }

      const shaData = await shaResp.json();

      const resp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `Delete ${lang}/${slug}.mdx`, sha: shaData.sha, branch: 'main' }),
      });

      if (resp.ok) {
        showMessage('Deleted successfully!');
        setTimeout(() => { window.location.href = `/${lang}/blog`; }, 1000);
      } else {
        const error = await resp.json();
        showMessage('Failed to delete: ' + (error.message || 'Unknown error'), 'error');
      }
    } catch (err) {
      showMessage('Failed to delete: ' + err.message, 'error');
    }
  }

  editor.addEventListener('input', () => { preview.textContent = editor.value; });
  saveBtn.addEventListener('click', saveContent);
  deleteBtn.addEventListener('click', deleteContent);

  loadContent();
</script> </div>  </main> <footer style="border-top: 1px solid var(--border-color); padding: 2rem 0; margin-top: 3rem; text-align: center; color: var(--text-secondary); font-size: 0.875rem;"> <div class="container"> <p>&copy; 2026 Blog & Portfolio. Built with Astro & GitHub Pages.</p> <p style="margin-top: 0.5rem;"> <a href="/ko/admin"> 관리자 설정 </a> </p> </div> </footer> </body></html>
